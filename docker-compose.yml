services:
  postgres:
    image: postgres:16-alpine
    container_name: recicla_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recicla_entulhos
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - recicla_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recicla_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/recicla_entulhos?schema=public
      PORT: 3456
    ports:
      - '3456:3456'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - recicla_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recicla_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3456/api
    ports:
      - '4321:4321'
    depends_on:
      - backend
    networks:
      - recicla_net

volumes:
  postgres_data:

networks:
  recicla_net:
    driver: bridge
